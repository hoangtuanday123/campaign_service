server:
  port: 8081

spring:
  application:
    name: campaign-service
  datasource:
    url: jdbc:mysql://localhost:3306/campaignservice
    username: user
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5
        compression.type: snappy
        delivery.timeout.ms: 120000
        spring.json.add.type.headers: false

security:
  jwt:
    secret: c3VwZXItc2VjdXJlLXN1cGVyLXNlY3VyZS1zdXBlci1zZWNyZS1rZXktZm9yLXVzZXItc2VydmljZQ==
    expiration-millis: 3600000

campaign:
  events:
    topic: campaign-events

services:
  user:
    base-url:
    user-by-id-path: /api/users/{id}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.example.campaignservice: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html