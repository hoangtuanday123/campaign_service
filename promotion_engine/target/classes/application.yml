server:
  port: 8084

spring:
  application:
    name: promotion-engine
  kafka:
    bootstrap-servers: localhost:19092,localhost:29092
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.example.promotionengine.dto.event.CampaignEvent
        spring.json.trusted.packages: com.example.promotionengine.dto.event
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 50ms

campaign:
  events:
    topic: campaign-events
    consumer-group: promotion-engine

services:
  user:
    base-url: http://localhost:8081
    user-by-id-path: /api/v1/users/{id}
    auth-token:
  campaign:
    base-url: http://localhost:8083
    campaign-by-id-path: /api/v1/campaigns/{id}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.example.promotionengine: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html